# AI Maturity Assessment - Sample Configuration
# Copy this to config.yml and customize for your analysis

# Data Source Configuration
data_sources:
  # Choose one: "api", "csv", "scraper", "warehouse"
  type: "csv"

  # API Configuration (if type: "api")
  api:
    provider: "linkedin"  # Options: "linkedin", "indeed", "glassdoor"
    api_key: ${JOBS_API_KEY}  # Set in .env file
    rate_limit: 100  # requests per hour

  # CSV Configuration (if type: "csv")
  csv:
    path: "data/raw/job_postings.csv"
    columns:
      company: "company_name"
      title: "job_title"
      description: "job_description"
      posted_date: "date_posted"
      function: "business_function"
      location: "location"

  # Web Scraper Configuration (if type: "scraper")
  scraper:
    career_pages:
      - "https://company-a.com/careers"
      - "https://company-b.com/careers"
    delay: 2  # seconds between requests

  # Data Warehouse Configuration (if type: "warehouse")
  warehouse:
    type: "snowflake"  # Options: "snowflake", "bigquery"
    account: ${SNOWFLAKE_ACCOUNT}
    database: "JOB_DATA"
    schema: "PUBLIC"
    table: "JOB_POSTINGS"

# Companies to Analyze
companies:
  - "Company A"
  - "Company B"
  - "Company C"

# Date Range
date_range:
  start: "2022-01-01"
  end: "2024-12-31"

# AI Role Classification
classification:
  # Keywords to identify AI-related roles
  ai_keywords:
    - "machine learning"
    - "ml engineer"
    - "data scientist"
    - "artificial intelligence"
    - "ai"
    - "deep learning"
    - "nlp"
    - "natural language processing"
    - "computer vision"
    - "mlops"
    - "ml platform"
    - "research scientist"

  # Seniority keywords
  seniority:
    leadership:
      - "chief"
      - "vp"
      - "vice president"
      - "head of"
      - "director"
    senior:
      - "senior"
      - "lead"
      - "principal"
      - "staff"
      - "architect"
    mid_level:
      - "engineer"
      - "scientist"
      - "analyst"
      - "manager"
    junior:
      - "junior"
      - "associate"
      - "entry"

  # Technical depth keywords
  specialized_roles:
    - "nlp"
    - "computer vision"
    - "reinforcement learning"
    - "research scientist"
    - "ml architect"

  # Business integration keywords
  business_keywords:
    - "product"
    - "strategy"
    - "operations"
    - "business"

  # Platform keywords (must include ML/AI)
  platform_keywords:
    - "mlops"
    - "ml platform"
    - "ml infrastructure"
    - "ai infrastructure"

  # Ecosystem keywords
  ecosystem_keywords:
    - "partnership"
    - "alliance"
    - "ecosystem"
    - "developer relations"

  # Ethics/regulatory keywords
  ethics_keywords:
    - "ethics"
    - "responsible ai"
    - "governance"
    - "compliance"
    - "fairness"
    - "bias"

# Maturity Analysis Configuration
analysis:
  # Dimension weights (must sum to 1.0)
  dimension_weights:
    technical_depth: 0.125
    technical_width: 0.125
    business_integration: 0.125
    governance: 0.125
    platformisation: 0.125
    seniority_mix: 0.125
    ecosystem: 0.125
    regulatory: 0.125

  # Scale adjustments
  scale_thresholds:
    enterprise: 300      # +1.0 level boost
    scaling: 150         # +0.5 level boost
    limited: 50          # -0.5 level reduction

  # Growth thresholds
  high_growth_multiplier: 2.0  # 2x YoY = +0.5 boost

  # Maturity level constraints
  min_level: 1.0
  max_level: 5.0
  increment: 0.5  # Allow 0.5 increments

# Output Configuration
output:
  # Report format
  format: "markdown"  # Options: "markdown", "html", "pdf"

  # Output paths
  reports_path: "outputs/reports/"
  visualizations_path: "outputs/visualizations/"

  # Include sections
  include_visualizations: true
  include_comparative_analysis: true
  include_dimension_breakdown: true
  include_temporal_trends: true

  # Visualization settings
  charts:
    style: "seaborn"  # Options: "seaborn", "plotly"
    color_palette: "Set2"
    figure_size: [12, 8]

# LLM Configuration (Optional - for narrative generation)
llm:
  enabled: false
  provider: "openai"  # Options: "openai", "anthropic"
  api_key: ${OPENAI_API_KEY}  # Set in .env
  model: "gpt-4"
  max_tokens: 500
  temperature: 0.7

# Logging
logging:
  level: "INFO"  # Options: "DEBUG", "INFO", "WARNING", "ERROR"
  file: "logs/analysis.log"
  console: true
